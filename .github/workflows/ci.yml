name: .NET

on:
  push:
    branches: [ dev*, main ]
  pull_request:
    branches: [ main ]
    paths:
      - src/**
      - .github/workflows/**

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore src/Chat.sln
    - name: Build
      run: dotnet build src/Chat.sln --no-restore
    - name: Test
      run: dotnet test src/Chat.sln --no-build --verbosity normal
