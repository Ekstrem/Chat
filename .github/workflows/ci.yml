name: Build and publish Chat microservice

on:
  push:
    branches: [ dev*, main ]
  pull_request:
    branches: [ main ]
    paths:
      - src/**
      - Dockerfile
      - .github/workflows/**

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Checkout DigiTFactory.Libraries
      uses: actions/checkout@v4
      with:
        repository: Ekstrem/DigiTFactory.Libraries
        path: DigiTFactory.Libraries
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Pack DigiTFactory.Libraries
      run: |
        cd DigiTFactory.Libraries
        dotnet pack Source/DigiTFactory.Libraries.SeedWorks.csproj -c Release -o nupkg -v minimal
        dotnet pack EventBus.InMemory/DigiTFactory.Libraries.EventBus.InMemory.csproj -c Release -o nupkg -v minimal
        dotnet pack EventBus.Kafka/DigiTFactory.Libraries.EventBus.Kafka.csproj -c Release -o nupkg -v minimal
        dotnet pack EventBus.Postgres/DigiTFactory.Libraries.EventBus.Postgres.csproj -c Release -o nupkg -v minimal
        dotnet pack CommandRepository.Mongo/DigiTFactory.Libraries.CommandRepository.Mongo.csproj -c Release -o nupkg -v minimal
        dotnet pack ReadRepository.Postgres/DigiTFactory.Libraries.ReadRepository.Postgres.csproj -c Release -o nupkg -v minimal
        dotnet pack ReadRepository.Redis/DigiTFactory.Libraries.ReadRepository.Redis.csproj -c Release -o nupkg -v minimal
        dotnet pack ReadRepository.Scylla/DigiTFactory.Libraries.ReadRepository.Scylla.csproj -c Release -o nupkg -v minimal

    - name: Configure NuGet for CI
      run: |
        sed -i '/<add key="github-ekstrem"/d' src/nuget.config
        sed -i '/<github-ekstrem>/,/<\/github-ekstrem>/d' src/nuget.config
        sed -i 's|../../DigiTFactory.Libraries/nupkg|DigiTFactory.Libraries/nupkg|g' src/nuget.config

    - name: Restore dependencies
      run: dotnet restore src/Chat.sln

    - name: Build
      run: dotnet build src/Chat.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test src/Chat.Domain.Tests/Chat.Domain.Tests.csproj --no-build --configuration Release --verbosity normal

  docker:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        profile:
          - { name: Single, tag: single }
          - { name: BudgetCqrs, tag: budget-cqrs }
          - { name: Cqrs, tag: cqrs }
          - { name: Ceqrs, tag: ceqrs }

    steps:
    - uses: actions/checkout@v4

    - name: Checkout DigiTFactory.Libraries
      uses: actions/checkout@v4
      with:
        repository: Ekstrem/DigiTFactory.Libraries
        path: DigiTFactory.Libraries
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Pack DigiTFactory.Libraries for Docker
      run: |
        cd DigiTFactory.Libraries
        dotnet pack Source/DigiTFactory.Libraries.SeedWorks.csproj -c Release -o nupkg -v minimal
        dotnet pack EventBus.InMemory/DigiTFactory.Libraries.EventBus.InMemory.csproj -c Release -o nupkg -v minimal
        dotnet pack EventBus.Kafka/DigiTFactory.Libraries.EventBus.Kafka.csproj -c Release -o nupkg -v minimal
        dotnet pack EventBus.Postgres/DigiTFactory.Libraries.EventBus.Postgres.csproj -c Release -o nupkg -v minimal
        dotnet pack CommandRepository.Mongo/DigiTFactory.Libraries.CommandRepository.Mongo.csproj -c Release -o nupkg -v minimal
        dotnet pack ReadRepository.Postgres/DigiTFactory.Libraries.ReadRepository.Postgres.csproj -c Release -o nupkg -v minimal
        dotnet pack ReadRepository.Redis/DigiTFactory.Libraries.ReadRepository.Redis.csproj -c Release -o nupkg -v minimal
        dotnet pack ReadRepository.Scylla/DigiTFactory.Libraries.ReadRepository.Scylla.csproj -c Release -o nupkg -v minimal
        cp -r nupkg ../local-nupkg

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ matrix.profile.tag }}
          type=sha,prefix=${{ matrix.profile.tag }}-

    - name: Build and push Docker image (${{ matrix.profile.name }})
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          DEPLOYMENT_PROFILE=${{ matrix.profile.name }}

  docker-latest:
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Checkout DigiTFactory.Libraries
      uses: actions/checkout@v4
      with:
        repository: Ekstrem/DigiTFactory.Libraries
        path: DigiTFactory.Libraries
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Pack DigiTFactory.Libraries for Docker
      run: |
        cd DigiTFactory.Libraries
        dotnet pack Source/DigiTFactory.Libraries.SeedWorks.csproj -c Release -o nupkg -v minimal
        dotnet pack EventBus.InMemory/DigiTFactory.Libraries.EventBus.InMemory.csproj -c Release -o nupkg -v minimal
        dotnet pack EventBus.Kafka/DigiTFactory.Libraries.EventBus.Kafka.csproj -c Release -o nupkg -v minimal
        dotnet pack EventBus.Postgres/DigiTFactory.Libraries.EventBus.Postgres.csproj -c Release -o nupkg -v minimal
        dotnet pack CommandRepository.Mongo/DigiTFactory.Libraries.CommandRepository.Mongo.csproj -c Release -o nupkg -v minimal
        dotnet pack ReadRepository.Postgres/DigiTFactory.Libraries.ReadRepository.Postgres.csproj -c Release -o nupkg -v minimal
        dotnet pack ReadRepository.Redis/DigiTFactory.Libraries.ReadRepository.Redis.csproj -c Release -o nupkg -v minimal
        dotnet pack ReadRepository.Scylla/DigiTFactory.Libraries.ReadRepository.Scylla.csproj -c Release -o nupkg -v minimal
        cp -r nupkg ../local-nupkg

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push latest (Single profile)
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        build-args: |
          DEPLOYMENT_PROFILE=Single
