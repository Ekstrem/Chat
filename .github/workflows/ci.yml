name: Build and publish Chat microservice

on:
  push:
    branches: [ dev*, main ]
  pull_request:
    branches: [ main ]
    paths:
      - src/**
      - Dockerfile
      - .github/workflows/**

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Remove LocalLibraries NuGet source (CI uses GitHub Packages)
      run: sed -i '/<add key="LocalLibraries"/d' src/nuget.config

    - name: Authenticate GitHub NuGet
      run: dotnet nuget update source github-ekstrem --username Ekstrem --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --configfile src/nuget.config

    - name: Restore dependencies
      run: dotnet restore src/Chat.sln

    - name: Build
      run: dotnet build src/Chat.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test src/Chat.Domain.Tests/Chat.Domain.Tests.csproj --no-build --configuration Release --verbosity normal

  docker:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        profile:
          - { name: Single, tag: single }
          - { name: BudgetCqrs, tag: budget-cqrs }
          - { name: Cqrs, tag: cqrs }
          - { name: Ceqrs, tag: ceqrs }

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ matrix.profile.tag }}
          type=sha,prefix=${{ matrix.profile.tag }}-

    - name: Build and push Docker image (${{ matrix.profile.name }})
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          DEPLOYMENT_PROFILE=${{ matrix.profile.name }}

  docker-latest:
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push latest (Single profile)
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        build-args: |
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          DEPLOYMENT_PROFILE=Single
