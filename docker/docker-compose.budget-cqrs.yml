version: "3.8"

# Профиль: Budget-CQRS
# Два деплоймента (Command + Query), PostgreSQL для обоих хранилищ
# в одной БД, Read-модели в схеме "ReadModel".
# EventBus: InMemory.

services:
  chat-app:
    image: ghcr.io/ekstrem/chat:budget-cqrs
    build:
      context: ..
      args:
        DEPLOYMENT_PROFILE: BudgetCqrs
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=BudgetCqrs
      - ConnectionStrings__ChatDb=Host=postgres;Port=5432;Database=chat;Username=postgres;Password=postgres
      - ConnectionStrings__ChatReadDb=Host=postgres;Port=5432;Database=chat;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
