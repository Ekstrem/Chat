version: "3.8"

# Профиль: CQRS
# Два деплоймента (Command + Query).
# Command DB: MongoDB (Event Store).
# Read DB: PostgreSQL (отдельная БД).
# EventBus: Postgres (межпроцессный — связывает Command и Query).
#
# Поток данных:
#   Client → [chat-command] → MongoDB → Postgres EventBus (publish) →
#            [chat-query]   ← Postgres EventBus (subscribe) → ProjectionHandler → PostgreSQL ReadModel

services:
  # --- Деплоймент 1: Command ---
  chat-command:
    image: ghcr.io/ekstrem/chat:cqrs
    build:
      context: ..
      args:
        DEPLOYMENT_PROFILE: Cqrs
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Cqrs
      - DeploymentRole=Command
      - CommandStore__Mongo__ConnectionString=mongodb://mongo:27017
      - CommandStore__Mongo__DatabaseName=chat_commands
      - EventBus__Strategy=Postgres
      - EventBus__Postgres__ConnectionString=Host=postgres;Port=5432;Database=chat_read;Username=postgres;Password=postgres
      - EventBus__Postgres__TableName=domain_events_outbox
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # --- Деплоймент 2: Query ---
  chat-query:
    image: ghcr.io/ekstrem/chat:cqrs
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Cqrs
      - DeploymentRole=Query
      - ReadStore__Provider=Postgres
      - ReadStore__SchemaName=ReadModel
      - ConnectionStrings__ChatReadDb=Host=postgres;Port=5432;Database=chat_read;Username=postgres;Password=postgres
      - EventBus__Strategy=Postgres
      - EventBus__Postgres__ConnectionString=Host=postgres;Port=5432;Database=chat_read;Username=postgres;Password=postgres
      - EventBus__Postgres__TableName=domain_events_outbox
    depends_on:
      postgres:
        condition: service_healthy

  # --- Инфраструктура ---
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_read
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongodata:
  pgdata:
